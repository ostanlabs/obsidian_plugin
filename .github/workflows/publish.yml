name: Publish to npm (manual)

# Manual re-publish lever only. The normal npm publish runs as the
# `publish-npm` job chained inside release.yml — a `release: published`
# trigger can never fire here because releases are created by a workflow
# using the default GITHUB_TOKEN (GitHub suppresses those events).
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: prod  # Required for npm Trusted Publishing
    permissions:
      contents: read
      id-token: write  # Required for npm provenance and OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 bundles npm 10.x; npm's OIDC Trusted Publishing needs a newer CLI.
      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
