name: Release Obsidian Plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # no v-prefix, e.g. 1.8.46

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release with plugin assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            main.js
            manifest.json
            styles.css

  # npm publish runs as a chained job rather than a release-triggered workflow:
  # releases created with the default GITHUB_TOKEN do not emit events that
  # trigger other workflows (GitHub recursion prevention), which is why the old
  # publish.yml never fired. The quality gate already ran in `release` on this
  # same commit, so this job only rebuilds the publish artifacts.
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    environment: prod  # npm Trusted Publishing (configure on npmjs.com: this repo, release.yml, prod)
    permissions:
      contents: read
      id-token: write  # OIDC for npm provenance / Trusted Publishing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      # Node 22 bundles npm 10.x; npm's OIDC Trusted Publishing needs a newer CLI.
      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build publish artifacts
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

